<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地球探索者 - 多维度地图平台</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-blue: #3498db;
            --accent-orange: #e67e22;
            --accent-red: #e74c3c;
            --accent-green: #27ae60;
            --bg-gradient-start: #f5f7fa;
            --bg-gradient-end: #c3cfe2;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

        /* 顶部标题区 */
        .hero {
            text-align: center;
            margin-top: 8vh;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        .hero h1 {
            font-size: 3.5rem;
            color: var(--primary-color);
            margin: 0;
            letter-spacing: 2px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        .hero p {
            font-size: 1.2rem;
            color: #555;
            margin-top: 15px;
            max-width: 600px;
            line-height: 1.6;
        }

        /* 导航卡片网格 - 适应4个方块 */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            width: 85%;
            max-width: 1100px;
            padding: 20px;
        }

        /* 卡片基础样式 */
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 35px 25px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 卡片顶部的高亮条 - 为不同主题设定不同颜色 */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 6px;
            transform: scaleX(0);
            transition: transform 0.3s ease;
            transform-origin: left;
        }

        .card.travel::before { background: var(--accent-blue); }
        .card.history::before { background: var(--accent-orange); }
        .card.culture::before { background: var(--accent-red); }
        .card.overview::before { background: var(--accent-green); }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            cursor: pointer;
        }

        .card:hover::before { transform: scaleX(1); }

        .card-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            transition: transform 0.3s ease;
        }

        .card:hover .card-icon { transform: scale(1.1) rotate(5deg); }

        .card h2 {
            margin: 0 0 12px 0;
            font-size: 1.4rem;
            color: #222;
            font-weight: 600;
        }

        .card p {
            margin: 0;
            color: #666;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* 动画效果 */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .card { animation: fadeInUp 0.6s ease-out backwards; }
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div class="hero">
        <h1>🌎 地球探索者</h1>
        <p>选择一个维度，以全新的视角俯瞰我们的世界。</p>
    </div>

    <div class="nav-grid">
        <a href="pages/travel.html" class="card travel">
            <span class="card-icon">🗺️</span>
            <h2>旅游足迹</h2>
            <p>标记已去过的国家与省份，点亮种草清单，探索世界自然与文化遗产。</p>
        </a>

        <a href="pages/history.html" class="card history" onclick="checkDev(event, '历史疆域')">
            <span class="card-icon">⏳</span>
            <h2>历史变迁</h2>
            <p>通过时间轴查看不同历史时期的帝国疆域、古丝绸之路与文明发源地。</p>
        </a>

        <a href="pages/culture.html" class="card culture" onclick="checkDev(event, '多元文化')">
            <span class="card-icon">🎭</span>
            <h2>多元文化</h2>
            <p>探索全球语系分布、宗教版图、世界非物质文化遗产及各地特色风情。</p>
        </a>

        <a href="pages/overview.html" class="card overview" onclick="checkDev(event, '宏观数据')">
            <span class="card-icon">📊</span>
            <h2>宏观数据</h2>
            <p>通过热力图与数据可视化，直观了解全球人口密度、GDP分布及气候带。</p>
        </a>
    </div>

    <script>
        // 优雅的拦截器：点击尚未创建的页面时给出提示
        function checkDev(event, themeName) {
            // 目前只有 travel.html 是存在的，其他的暂时拦截
            event.preventDefault(); 
            alert(`🚧 【${themeName}】地图正在开发中！\n\n未来这里将是一张结合了特定地理数据 (GeoJSON/CSV) 的专属 Leaflet 地图。敬请期待！`);
        }
    </script>
</body>
</html>
