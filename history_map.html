<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界历史地图册</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; overflow: hidden; }
        
        /* 地图区域 */
        #map { flex: 1; height: 100%; }
        
        /* 右侧时间轴面板 */
        #sidebar {
            width: 350px;
            background-color: #f8f9fa;
            border-left: 1px solid #ddd;
            padding: 20px;
            box-shadow: -2px 0 5px rgba(0,0,0,0.1);
            overflow-y: auto;
            transition: transform 0.3s ease;
        }

        h2 { margin-top: 0; color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .placeholder-text { color: #666; font-style: italic; margin-top: 20px; }

        /* 时间轴 UI 设计 */
        .timeline {
            border-left: 3px solid #007bff;
            padding-left: 20px;
            margin-top: 20px;
            list-style: none;
        }
        .timeline-item { position: relative; margin-bottom: 25px; }
        
        /* 时间轴节点的小圆点 */
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -28px;
            top: 5px;
            width: 12px;
            height: 12px;
            background-color: #fff;
            border: 3px solid #007bff;
            border-radius: 50%;
        }
        
        .year { font-weight: bold; color: #007bff; font-size: 1.1em; }
        .event { margin: 5px 0; color: #444; }
        .event-link { text-decoration: none; color: #28a745; font-size: 0.9em; font-weight: bold;}
        .event-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div id="sidebar">
        <h2 id="country-name">请将鼠标划到国家上</h2>
        <div id="timeline-container">
            <p class="placeholder-text">此处将显示该国家的历史时间轴...</p>
        </div>
    </div>

    <script>
        // 1. 初始化地图 (设置视角为世界地图)
        var map = L.map('map').setView([20, 0], 2);

        // 使用 OpenStreetMap 作为底图
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        // 2. 模拟的历史数据库 (JSON 格式)
        // 在实际项目中，你会把这些数据放在后端或单独的 JSON 文件中
        const historyDatabase = {
            "China": [
                { year: "公元前221年", event: "秦朝建立，首次统一中国", link: "https://zh.wikipedia.org/wiki/%E7%A7%A6%E6%9C%9D" },
                { year: "618年", event: "唐朝建立", link: "https://zh.wikipedia.org/wiki/%E5%94%90%E6%9C%9D" },
                { year: "1911年", event: "辛亥革命爆发", link: "https://zh.wikipedia.org/wiki/%E8%BE%9B%E4%BA%A5%E9%9D%A9%E5%91%BD" },
                { year: "1949年", event: "中华人民共和国成立", link: "https://zh.wikipedia.org/wiki/%E4%B8%AD%E5%8D%8E%E4%BA%BA%E6%B0%91%E5%85%B1%E5%92%8C%E5%9B%BD" }
            ],
            "United States of America": [
                { year: "1776年", event: "发表《独立宣言》", link: "https://zh.wikipedia.org/wiki/%E7%BE%8E%E5%9C%8B%E7%8D%A8%E7%AB%8B%E5%AE%A3%E8%A8%80" },
                { year: "1861年", event: "南北战争爆发", link: "https://zh.wikipedia.org/wiki/%E5%8D%97%E5%8C%97%E6%88%B0%E7%88%AD" },
                { year: "1969年", event: "阿波罗11号登月", link: "https://zh.wikipedia.org/wiki/%E9%98%BF%E6%B3%A2%E7%BD%9711%E5%8F%B7" }
            ],
            "France": [
                { year: "1789年", event: "法国大革命爆发", link: "https://zh.wikipedia.org/wiki/%E6%B3%95%E5%9B%BD%E5%A4%A7%E9%9D%A9%E5%91%BD" },
                { year: "1804年", event: "拿破仑称帝", link: "https://zh.wikipedia.org/wiki/%E6%8B%BF%E7%A0%B4%E4%BB%91%E4%B8%80%E4%B8%96" },
                { year: "1944年", event: "巴黎解放", link: "https://zh.wikipedia.org/wiki/%E5%B7%B4%E9%BB%8E%E8%A7%A3%E6%94%BE" }
            ]
        };

        // 3. 渲染时间轴的函数
        function renderTimeline(countryName) {
            const titleEl = document.getElementById('country-name');
            const containerEl = document.getElementById('timeline-container');
            
            titleEl.textContent = countryName + " 历史";
            
            const events = historyDatabase[countryName];
            
            if (events && events.length > 0) {
                let html = '<ul class="timeline">';
                events.forEach(item => {
                    html += `
                        <li class="timeline-item">
                            <div class="year">${item.year}</div>
                            <div class="event">${item.event}</div>
                            <a href="${item.link}" target="_blank" class="event-link">了解更多 &rarr;</a>
                        </li>
                    `;
                });
                html += '</ul>';
                containerEl.innerHTML = html;
            } else {
                containerEl.innerHTML = '<p class="placeholder-text">暂无该国家的历史数据，敬请期待更新！</p>';
            }
        }

        // 4. 加载世界国家的 GeoJSON 数据并添加交互
        // 这里我们使用一个开源的 GeoJSON 文件来绘制国家边界
        fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: function (feature) {
                        return {
                            fillColor: '#007bff',
                            weight: 1,
                            opacity: 1,
                            color: 'white',
                            fillOpacity: 0.1
                        };
                    },
                    onEachFeature: function (feature, layer) {
                        // 划过国家时的交互 (Hover)
                        layer.on({
                            mouseover: function (e) {
                                var layer = e.target;
                                layer.setStyle({
                                    fillOpacity: 0.5, // 鼠标划过时高亮
                                    weight: 2
                                });
                                // 触发时间轴更新
                                renderTimeline(feature.properties.name);
                            },
                            mouseout: function (e) {
                                var layer = e.target;
                                layer.setStyle({
                                    fillOpacity: 0.1, // 恢复原状
                                    weight: 1
                                });
                            }
                        });
                    }
                }).addTo(map);
            });
    </script>
</body>
</html>
